name: ADMIN
on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --config apps/admin/fly.toml --dockerfile apps/admin/Dockerfile
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_ADMIN_TOKEN }}
